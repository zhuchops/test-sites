name: Site Monitor

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "start script"
        default: "staging"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run script
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: uv run main.py
